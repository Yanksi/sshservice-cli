name = "cscs-key-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV namespace holds per-user encrypted blobs keyed by HMAC(PEPPER, "user:" + token).
# This id is the namespace provisioned for Yanksi's account when the Worker
# was first deployed via the button. Anyone forking this repo to deploy their
# own Worker should replace it with the id printed by
# `npx wrangler kv namespace create CERT_STORE` against their own account.
[[kv_namespaces]]
binding = "CERT_STORE"
id = "2832c9b911d0461eaa02721f2f59ae5b"

# No cron triggers in the new design — refresh happens lazily on
# GET /credential. Declared explicitly so wrangler removes any cron left
# over from a prior deploy of an older version of this Worker.
[triggers]
crons = []

# Secrets are *not* declared here (use `wrangler secret put` or the
# Cloudflare dashboard). The Worker now requires only ONE secret:
#
#   WORKER_PEPPER  — 32 bytes of randomness, hex-encoded. Used as the salt
#                    for HKDF-derived encryption keys and for the HMAC that
#                    derives KV keys from per-user tokens. Generate once,
#                    keep stable forever — rotating it makes every existing
#                    encrypted blob unrecoverable.
#                    Example: `openssl rand -hex 32`
#
# No CSCS credentials are stored at the Worker level: each user POSTs their
# own credentials encrypted with their own bearer token to /account.
