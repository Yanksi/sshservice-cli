name = "cscs-key-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV namespace holds the latest generated key + cert as a single JSON blob.
# Replace `id` with the value from `npx wrangler kv namespace create CERT_STORE`.
# (The Deploy-to-Cloudflare button provisions this automatically.)
[[kv_namespaces]]
binding = "CERT_STORE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Cron: refresh twice a day. CSCS certs are valid for 24h.
[triggers]
crons = ["0 */12 * * *"]

# Secrets are *not* declared here (use `wrangler secret put` or the
# Deploy-to-Cloudflare UI). They are:
#   CSCS_USERNAME       — your CSCS username
#   CSCS_PASSWORD       — your CSCS password
#   CSCS_OTP_SECRET     — your CSCS TOTP secret (base32, the seed — not a 6-digit code)
#   FETCH_TOKEN         — bearer token clients present to GET /cert and POST /refresh
